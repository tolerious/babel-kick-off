# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run docs:build

    - name: Copy To ECS
      # You may pin to the exact commit or the version.
      # uses: betanzos/scp-upload@6681a6d4596e23b96314c6c4ae2c154d4c4d346c
      uses: betanzos/scp-upload@v1
      with:
        # Source local file path
        source: "./dist"
        # Remote host
        host: ${{ secrets.ECS_HOST }}
        # Remote host SSH port
        #port: # optional, default is 22
        # Remote host username
        username: ${{ secrets.ECS_USERNAME }}
        # SSH private key
        key: ${{ secrets.ECS_SSH_KEY }}
        # Remote directory to copy the file
        remote_dir: /var/www/html/
        # Recursively copy entire source directories. Valid values: true and false (specified as strings)
        recursive: true
    - name: SCP Uploader
      # You may pin to the exact commit or the version.
      # uses: moonpathbg/scp_uploader@aa0000920bb0f95c95de531e49ca4a70b05777ac
      uses: moonpathbg/scp_uploader@latest
      with:
        # remote host
        host: ${{ secrets.ECS_HOST }}
        # remote user
        username: ${{ secrets.ECS_USERNAME }}
        # remote port
        #port: # optional, default is 22
        # ssh private key (~/.ssh/id_rsa)
        key: ${{ secrets.ECS_SSH_KEY }}
        # source files path
        source: "./dist"
        # destination path
        target: "/var/www/html"
          
          

          
