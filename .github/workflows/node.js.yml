# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run docs:build

    - name: Copy To ECS
      # uses: appleboy/scp-action@master
      # with:
      #   host: ${{ secrets.ECS_HOST }}
      #   username: ${{ secrets.ECS_USERNAME }}
      #   key: ${{ secrets.ECS_SSH_KEY }}
      #   source: "dist/*" # 要复制的本地文件或目录
      #   target: "/var/www/html" # 服务器上的目标路径
      # You may pin to the exact commit or the version.
      # uses: srueda99/scp-action@6061b4a0cc9cfcca8e352035b9d10de6ac6f75b9
      uses: srueda99/scp-action@v13
      with:
        # IP Address or DNS of your target host
        host: ${{ secrets.ECS_HOST }}
        # Source route folder
        #origin: # optional, default is ./*
        # Destination route folder
        destination: "/var/www/html"
        # User for remote connection
        username: ${{ secrets.ECS_USERNAME }}
        # Password for the user
        #password: # optional
        # Private SSH key
        key: ${{ secrets.ECS_SSH_KEY }}# optional

          
